name: Build (Test)

# Run automatically on push to main, OR trigger manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: both
        type: choice
        options: [both, windows, mac]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist/*.exe
          - os: macos-latest
            platform: mac
            artifact: dist/*.dmg

    # Skip a platform if the manual trigger asked for only one
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'both' ||
      (inputs.platform == 'windows' && matrix.platform == 'win') ||
      (inputs.platform == 'mac'     && matrix.platform == 'mac')

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist:${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ganakam-${{ matrix.platform }}-${{ github.sha }}
          path: ${{ matrix.artifact }}
          retention-days: 14
