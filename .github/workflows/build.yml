name: Build (Test)

# Run automatically on push to main, OR trigger manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: both
        type: choice
        options: [both, windows, mac]

permissions:
  contents: read

jobs:
  build-windows:
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'both' ||
      inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: ganakam-windows-${{ github.sha }}
          path: dist/*.exe
          retention-days: 14

  build-mac:
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'both' ||
      inputs.platform == 'mac'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: ganakam-mac-${{ github.sha }}
          path: dist/*.dmg
          retention-days: 14
